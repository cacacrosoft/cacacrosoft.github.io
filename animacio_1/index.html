<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Profi Siker Animáció</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: linear-gradient(120deg, #a1c4fd, #c2e9fb);
    font-family: sans-serif;
    overflow: hidden;
  }

  .animation-container {
    position: relative;
    width: 150px;
    height: 150px;
  }

  /* Központi kör */
  .circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 6px solid #28a745;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transform: scale(0);
    animation: circleAnim 1s forwards;
  }

  @keyframes circleAnim {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.3); opacity: 1; }
    70% { transform: scale(0.9); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Pipa */
  .check {
    position: absolute;
    width: 60px;
    height: 30px;
    border-left: 6px solid #28a745;
    border-bottom: 6px solid #28a745;
    transform: rotate(-45deg) scale(0);
    top: 55px;
    left: 40px;
    animation: checkAnim 0.8s 1s forwards;
  }

  @keyframes checkAnim {
    0% { transform: rotate(-45deg) scale(0); }
    60% { transform: rotate(-45deg) scale(1.3); }
    100% { transform: rotate(-45deg) scale(1); }
  }

  /* Csillagok / sparkles */
  .spark {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: sparkAnim 1.5s forwards;
  }

  .spark1 { top: -15px; left: 50%; animation-delay: 0.8s; }
  .spark2 { top: 50%; left: -15px; animation-delay: 0.9s; }
  .spark3 { top: 100%; left: 50%; animation-delay: 1s; }
  .spark4 { top: 50%; left: 100%; animation-delay: 1.1s; }
  .spark5 { top: 10%; left: 10%; animation-delay: 0.95s; }
  .spark6 { top: 85%; left: 20%; animation-delay: 1.05s; }
  .spark7 { top: 15%; left: 80%; animation-delay: 1.15s; }
  .spark8 { top: 80%; left: 75%; animation-delay: 1.2s; }

  @keyframes sparkAnim {
    0% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.5) rotate(180deg); }
    100% { opacity: 0; transform: scale(0) rotate(360deg); }
  }

  .caption {
    margin-top: 20px;
    font-size: 16px;
    color: #333;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="animation-container">
  <div class="circle"></div>
  <div class="check"></div>
  <div class="spark spark1"></div>
  <div class="spark spark2"></div>
  <div class="spark spark3"></div>
  <div class="spark spark4"></div>
  <div class="spark spark5"></div>
  <div class="spark spark6"></div>
  <div class="spark spark7"></div>
  <div class="spark spark8"></div>
</div>

<div class="caption">Aláírva</div>

</body>
</html>
