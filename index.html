<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.......................................</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#overlay {
  position: fixed;
  inset: 0;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999999;
  text-align: center;
  padding: 20px;
}

.btn {
  margin-top: 15px;
  background: #111;
  color: #0f0;
  border: 2px solid #0f0;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 22px;
  transition: 0.2s;
}

.btn:hover {
  box-shadow: 0 0 15px #0f0;
  transform: scale(1.1);
}

/* videó fix */
video {
  margin-top: 20px;
  width: 320px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div id="overlay">

  <img src="http://cacacrosoft.github.io/k.png" width="250">

  <h2>Ez az oldal nem támogatja a 14.1-et.</h2>

  <img src="https://github.com/cacacrosoft/cacacrosoft.github.io/blob/main/gear_loading.gif?raw=true" width="100">

  <a href="https://osztaly.qzz.io/" target="_blank"
     style="margin-top:10px; display:inline-block; padding:10px 18px; background:#7360f2; color:white; text-decoration:none; border-radius:8px;">
     👉 Új oldal
  </a>

  <!-- 🎵 ZENE (MP3-ra cserélve ajánlott) -->


  <!-- 🎬 VIDEÓ -->
  <button class="btn" id="videoBtn">🎬</button>

  <video id="videoPlayer" controls preload="metadata">
    <source src="https://marcell.qzz.io/rick.mp4" type="video/mp4">
  </video>

</div>

<script>
const musicBtn = document.getElementById("musicBtn");
const videoBtn = document.getElementById("videoBtn");

const audio = document.getElementById("bgMusic");
const video = document.getElementById("videoPlayer");

/* 🎵 Zene */


/* 🎬 Videó */
videoBtn.addEventListener("click", async () => {
  if (video.style.display !== "block") {
    video.style.display = "block";
    video.load();

    try {
      await video.play();
      videoBtn.textContent = "⏸";
    } catch (e) {
      console.log("Video hiba:", e);
    }

  } else {
    video.pause();
    video.style.display = "none";
    videoBtn.textContent = ".";
  }
});
</script>

</body>
</html>
