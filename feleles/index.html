```html
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki felel?</title>

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #333;
    color: white;
    text-shadow: 1px 1px 5px black;
  }

  /* VIDEÓ HÁTTÉR */
  #bgvideo{
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  .topnav {
    display: flex;
    background-color: rgba(0,0,0,0.6);
    overflow: hidden;
    z-index: 10;
    position: relative;
  }

  .topnav a {
    padding: 14px 16px;
    text-decoration: none;
    color: #f2f2f2;
    font-size: 17px;
    cursor: pointer;
  }

  .topnav a.active { background-color: #F54927; color: white; }
  .topnav a:hover { background-color: #ddd; color: black; }

  .content {
    display: none;
    padding: 20px;
    text-align: center;
  }

  .content.active {
    display: block;
  }

  iframe{
    display:block;
    margin:auto;
  }

  @media(max-width:768px){
    .topnav{flex-direction:column;}
    .topnav a{font-size:18px; padding:16px;}
    h2{font-size:22px;}
  }
</style>
</head>
<body>

<!-- VIDEÓ HÁTTÉR -->
<video autoplay muted loop id="bgvideo">
  <source src="hatter2.mp4" type="video/mp4">
</video>

<div class="topnav">
  <a onclick="showContent('learazasok')" class="active" id="learazasokLink">Felelés</a>
</div>

<div id="learazasok" class="content active">
<iframe style="max-width:100%" src="https://wordwall.net/embed/fe7502ac235b4a8ea99c38d97bd53b38?themeId=21&templateId=8&fontStackId=0" width="500" height="380" frameborder="0" allowfullscreen></iframe>
</div>

<script>
function showContent(id){
  document.querySelectorAll(".content").forEach(el=>el.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
```
