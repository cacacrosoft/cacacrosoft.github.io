<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>4 EGYHANGUHÓNAP</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f2027, #0b0b0b);
  color: white;
  text-align: center;
}

.screen {
  display: none;
  padding: 40px;
  animation: fade 0.4s;
}

.active {
  display: block;
}

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

button {
  padding: 12px 25px;
  margin: 15px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(45deg, #00ffcc, #00aaff);
  color: black;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px #00ffcc;
}

.word {
  display: inline-block;
  padding: 12px;
  margin: 6px;
  border-radius: 12px;
  border: 1px solid #00ffcc;
  cursor: pointer;
  transition: 0.2s;
}

.word:hover {
  transform: scale(1.1);
}

.selected {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 10px #00ffcc;
}

canvas {
  margin-top: 20px;
  border-radius: 10px;
  background: white;
  padding: 10px;
}
</style>
</head>

<body>

<!-- START -->
<div id="screen1" class="screen active">
  <h1>Üdvözli teaházunk</h1>
  <h3>Készitette maci!</h3>
  <button onclick="next(2)">Start</button>
</div>

<!-- WORDS -->
<div id="screen2" class="screen">
  <h2>Válassz</h2>
  <div id="words"></div>
  <button onclick="generateQR()">Tovább</button>
</div>

<!-- QR -->
<div id="screen3" class="screen">
  <h2>QR kód. fottóza le!</h2>
  <canvas id="qr"></canvas>
  <br>
  <button onclick="next(4)">Tovább</button>
</div>

<!-- SEND -->
<div id="screen4" class="screen">
  <h2>Küldés</h2>
  <button onclick="sendMail()">Beküldés</button>
</div>

<script>
const FIX_EMAIL = "tettamantimarcell@gmail.com"; // IDE ÍRD

const words = ["Gyümölcs saláta" , "sóda","almafröcs","víz","kávé","tea"];
let selected = [];

const container = document.getElementById("words");

words.forEach(w => {
  const div = document.createElement("div");
  div.className = "word";
  div.innerText = w;

  div.onclick = () => {
    div.classList.toggle("selected");

    if(selected.includes(w)){
      selected = selected.filter(x => x !== w);
    } else {
      selected.push(w);
    }
  };

  container.appendChild(div);
});

function next(n){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen"+n).classList.add("active");
}

function generateQR(){
  const text = selected.join(" ");
  QRCode.toCanvas(document.getElementById("qr"), text);
  next(3);
}

function sendMail(){
  const text = selected.join(" ");

  const subject = encodeURIComponent("QR adat");
  const body = encodeURIComponent("QR tartalom:\n\n" + text);

  window.location.href =
    `https://mail.google.com/mail/?view=cm&fs=1&to=${FIX_EMAIL}&su=${subject}&body=${body}`;
}
</script>

</body>
</html>
