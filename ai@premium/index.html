<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Perplexity Style Search</title>

<style>
/* =========================
   GLOBAL STYLING
========================= */
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; }

body {
  background: #0b0b0b;
  color: #fff;
  line-height: 1.6;
}

/* =========================
   HEADER
========================= */
header {
  text-align:center;
  font-size:32px;
  font-weight:bold;
  padding:30px;
  background: linear-gradient(90deg,#007aff,#00d4ff);
  color:#fff;
  letter-spacing:1px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

/* =========================
   SEARCH BOX
========================= */
.search-box {
  display:flex;
  justify-content:center;
  gap:15px;
  padding:25px;
}

input {
  width:60%;
  padding:15px 20px;
  border-radius:40px;
  border:none;
  font-size:17px;
  background:#111;
  color:white;
}

input:focus { outline:none; box-shadow:0 0 10px #007aff; }

button {
  padding:15px 25px;
  border-radius:40px;
  border:none;
  background:#007aff;
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover { background:#00d4ff; }

/* =========================
   AI BOX
========================= */
#aiBox {
  margin:20px auto;
  width:90%;
  background:#111;
  padding:25px;
  border-radius:20px;
  border:1px solid #222;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  font-size:16px;
  line-height:1.8;
  transition:0.3s;
}

/* =========================
   SOURCES
========================= */
#sources {
  margin:20px auto;
  width:90%;
  background:#0f0f0f;
  padding:20px;
  border-radius:20px;
  border:1px solid #222;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.source {
  margin-bottom:12px;
}

.source a {
  color:#4da3ff;
  text-decoration:none;
  font-weight:bold;
}

.source a:hover { text-decoration:underline; }

/* =========================
   LOADER
========================= */
.loader {
  text-align:center;
  padding:50px;
  font-size:22px;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0%{ opacity:0.3; }
  50%{ opacity:1; }
  100%{ opacity:0.3; }
}

/* =========================
   RESPONSIVE GRID
========================= */
.results-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  margin:20px auto;
  width:90%;
}

/* =========================
   RESULT CARD
========================= */
.card {
  background:#111;
  border-radius:20px;
  border:1px solid #222;
  padding:20px;
  transition:0.3s;
}

.card:hover { box-shadow:0 0 15px #007aff; }

.card a {
  color:#00d4ff;
  text-decoration:none;
  font-weight:bold;
}

.card a:hover { text-decoration:underline; }

.card p { color:#ccc; margin-top:10px; }

.time { font-size:12px; color:#777; margin-top:8px; }

/* =========================
   FOOTER
========================= */
footer {
  text-align:center;
  padding:20px;
  font-size:14px;
  color:#555;
  border-top:1px solid #222;
}
</style>
</head>
<body>

<header>🧠 AI Perplexity-Style Search</header>

<div class="search-box">
  <input id="q" placeholder="Kérdezz bármit...">
  <button onclick="search()">Keresés</button>
</div>

<div id="aiBox"></div>
<div id="sources"></div>

<footer>Made by Marcell | AI Search Demo</footer>

<script>
/* =========================
   SAFE FETCH
========================= */
async function safe(url){
  try{
    let r = await fetch(url);
    return await r.json();
  }catch{
    return null;
  }
}

/* =========================
   SOURCES FETCH
========================= */
async function getSources(q){
  let results=[];

  // 1️⃣ Wikipedia
  let wiki = await safe(`https://hu.wikipedia.org/api/rest_v1/page/summary/${q}`);
  if(wiki && wiki.extract){
    results.push({title:wiki.title, text:wiki.extract, link:wiki.content_urls.desktop.page});
  }

  // 2️⃣ DuckDuckGo
  let duck = await safe(`https://api.duckduckgo.com/?q=${q}&format=json`);
  if(duck && duck.AbstractText){
    results.push({title:duck.Heading,text:duck.AbstractText,link:duck.AbstractURL});
  }

  // 3️⃣ StackExchange
  let stack = await safe(`https://api.stackexchange.com/2.3/search/advanced?order=desc&sort=relevance&q=${q}&site=stackoverflow`);
  if(stack && stack.items){
    stack.items.slice(0,3).forEach(i=>{
      results.push({title:"StackOverflow",text:i.title,link:i.link});
    });
  }

  // 4️⃣ OpenLibrary (könyvinfók)
  let lib = await safe(`https://openlibrary.org/search.json?q=${q}&limit=3`);
  if(lib && lib.docs){
    lib.docs.forEach(d=>{
      results.push({title:d.title,text:d.author_name ? "Szerző: "+d.author_name.join(", ") : d.title, link:"https://openlibrary.org"+d.key});
    });
  }

  // 5️⃣ Example API (nyílt)
  results.push({title:"Sample Source",text:"Ez egy minta szöveg a téma bemutatására.",link:"#"});

  return results;
}

/* =========================
   SCORE SENTENCE
========================= */
function scoreSentence(s, query){
  let score = 0;
  query.split(" ").forEach(word=>{
    if(s.toLowerCase().includes(word.toLowerCase())) score+=2;
  });
  score += s.length/100;
  return score;
}

/* =========================
   GENERATE ANSWER
========================= */
function generateAnswer(sources, query){
  let text = sources.map(s=>s.text).join(" ");
  if(!text) return "Nem találtam elég információt.";

  let sentences = text.split(/[.!?]/).map(s=>s.trim()).filter(s=>s.length>25);
  let ranked = sentences.map(s=>({text:s,score:scoreSentence(s,query)})).sort((a,b)=>b.score-a.score).map(s=>s.text);
  let unique = [...new Set(ranked)].slice(0,10);

  let q = query.toLowerCase();
  let type = "general";
  if(q.includes("mi az")||q.includes("what is")) type="definition";
  else if(q.includes("hogyan")||q.includes("how")) type="how";
  else if(q.includes("miért")||q.includes("why")) type="why";

  let intro="",body="",conclusion="";
  if(type==="definition"){
    intro=`A "${query}" egy olyan fogalom, amely:`;
    body=unique.slice(0,4).map(s=>"• "+s).join("\n");
    conclusion="Összességében ez egy jól meghatározható fogalom több szempontból.";
  } else if(type==="how"){
    intro=`A "${query}" kérdésre a válasz lépésekben:`;
    body=unique.slice(0,5).map((s,i)=>`${i+1}. ${s}`).join("\n");
    conclusion="Ez a folyamat általában több lépésből áll, és a részletek számítanak.";
  } else if(type==="why"){
    intro=`A "${query}" oka több tényezőből áll:`;
    body=unique.slice(0,5).map(s=>"• "+s).join("\n");
    conclusion="Összefoglalva: a jelenség több ok együttes hatása.";
  } else {
    intro=`A "${query}" témában az alábbi információk találhatók:`;
    body=unique.slice(0,6).map(s=>"• "+s).join("\n");
    conclusion="Összességében a téma több oldalról megközelíthető.";
  }

  return `${intro}\n\n${body}\n\n${conclusion}`;
}

/* =========================
   RENDER SOURCES
========================= */
function renderSources(sources){
  let div=document.getElementById("sources");
  div.innerHTML="<h3>🔗 Források</h3>";
  sources.forEach(s=>{
    div.innerHTML+=`<div class="source"><a href="${s.link}" target="_blank">${s.title}</a></div>`;
  });
}

/* =========================
   SPEAK
========================= */
function speak(text){
  speechSynthesis.cancel();
  let clean=text.replace(/•/g,"").replace(/\n/g," ");
  let s=new SpeechSynthesisUtterance(clean);
  s.lang="hu-HU";
  s.rate=1;
  s.pitch=1;
  speechSynthesis.speak(s);
}

/* =========================
   SEARCH FUNCTION
========================= */
async function search(){
  let q=document.getElementById("q").value;
  if(!q) return;
  document.getElementById("aiBox").innerHTML="<div class='loader'>🧠 Gondolkodás...</div>";
  document.getElementById("sources").innerHTML="";

  let sources=await getSources(q);
  if(sources.length===0){
    document.getElementById("aiBox").innerHTML="Nincs elég adat.";
    return;
  }

  let answer=generateAnswer(sources,q);
  document.getElementById("aiBox").innerHTML=`<h2>🧠 AI válasz</h2><p>${answer.replace(/\n/g,"<br>")}</p>`;
  renderSources(sources);
  speak(answer);
}

/* =========================
   ENTER KEY
========================= */
document.getElementById("q").addEventListener("keypress",e=>{
  if(e.key==="Enter") search();
});
</script>
</body>
</html>
